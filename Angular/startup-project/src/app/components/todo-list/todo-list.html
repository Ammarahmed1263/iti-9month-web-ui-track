<app-task-list
  [tasks]="tasks"
  (deleteTask)="handleDeleteTask($event)"
  (editTask)="startEditingTask($event)"
  (updateTask)="handleUpdateTask($event)"
  (showToast)="handleShowToast($event)"
  [(filter)]="filter"
></app-task-list>
<app-inputs
  [editingTask]="editingTask"
  (addTaskEvent)="saveTask($event)"
  (showToast)="handleShowToast($event)"
></app-inputs>
