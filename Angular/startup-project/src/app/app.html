<div class="root">
  <app-header></app-header>
  <app-carousel />
  <main class="container">
    <app-todo-list
    class="content"
    (showToast)="showToast($event.message, $event.type)"
    ></app-todo-list>
  </main>
  <app-footer></app-footer>

  <app-toast
    [type]="toastMessage.type"
    [message]="toastMessage.message"
    [show]="toastMessage.show"
    (closed)="onToastClosed()"
  ></app-toast>
</div>
