title: Gym Titan
description: Gym Titan is a PWA that helps you track your workouts and progress. It provides a simple and intuitive interface to log your exercises, sets, and reps, and it also offers a 1 Rep Max (RM) estimator to help you determine the maximum weight you can lift for a given exercise. With Gym Titan, you can easily monitor your fitness journey and stay motivated to achieve your goals.